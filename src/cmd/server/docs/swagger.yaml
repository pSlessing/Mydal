basePath: /
definitions:
  mydal_src_internal_domain.Album:
    properties:
      artistID:
        type: string
      coverKey:
        type: string
      id:
        type: string
      releaseYear:
        type: integer
      title:
        type: string
    type: object
  mydal_src_internal_domain.Artist:
    properties:
      id:
        type: string
      name:
        type: string
    type: object
  mydal_src_internal_domain.Track:
    properties:
      album:
        $ref: '#/definitions/mydal_src_internal_domain.Album'
      artist:
        $ref: '#/definitions/mydal_src_internal_domain.Artist'
      bitrate:
        type: integer
      createdAt:
        type: string
      duration:
        $ref: '#/definitions/time.Duration'
      format:
        description: '"flac", "mp3", etc.'
        type: string
      id:
        type: string
      storageKey:
        description: path in S3 or local fs
        type: string
      title:
        type: string
    type: object
  time.Duration:
    enum:
    - -9223372036854775808
    - 9223372036854775807
    - 1
    - 1000
    - 1000000
    - 1000000000
    - 60000000000
    - 3600000000000
    format: int64
    type: integer
    x-enum-varnames:
    - minDuration
    - maxDuration
    - Nanosecond
    - Microsecond
    - Millisecond
    - Second
    - Minute
    - Hour
host: localhost:8080
info:
  contact: {}
  description: Music library management and streaming API
  title: Mydal API
  version: "1.0"
paths:
  /albums:
    post:
      consumes:
      - application/json
      description: Add a new album to the database
      parameters:
      - description: Album payload
        in: body
        name: album
        required: true
        schema:
          $ref: '#/definitions/mydal_src_internal_domain.Album'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Album'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new album
      tags:
      - albums
  /albums/{id}:
    delete:
      description: Remove an album from the database by ID
      parameters:
      - description: Album ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an album
      tags:
      - albums
    get:
      description: Retrieve a single album by its unique identifier
      parameters:
      - description: Album ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Album'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get album by ID
      tags:
      - albums
  /artists:
    post:
      consumes:
      - application/json
      description: Add a new artist to the database
      parameters:
      - description: Artist payload
        in: body
        name: artist
        required: true
        schema:
          $ref: '#/definitions/mydal_src_internal_domain.Artist'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Artist'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new artist
      tags:
      - artists
  /artists/{id}:
    delete:
      description: Remove an artist from the database by ID
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete an artist
      tags:
      - artists
    get:
      description: Retrieve a single artist by their unique identifier
      parameters:
      - description: Artist ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Artist'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get artist by ID
      tags:
      - artists
  /tracks:
    post:
      consumes:
      - application/json
      description: Add a new track to the database
      parameters:
      - description: Track payload
        in: body
        name: track
        required: true
        schema:
          $ref: '#/definitions/mydal_src_internal_domain.Track'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Track'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new track
      tags:
      - tracks
  /tracks/{id}:
    delete:
      description: Remove a track from the database by ID
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a track
      tags:
      - tracks
    get:
      description: Retrieve a single track by its unique identifier
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/mydal_src_internal_domain.Track'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get track by ID
      tags:
      - tracks
  /tracks/{id}/file:
    put:
      consumes:
      - application/octet-stream
      description: Upload the audio binary for an existing track. Content-Type must
        be an audio MIME type.
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: string
      - description: Audio file binary
        in: formData
        name: file
        required: true
        type: file
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Upload track audio file
      tags:
      - tracks
  /tracks/{id}/stream:
    get:
      description: Stream the audio file for a track via HTTP range requests
      parameters:
      - description: Track ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - audio/*
      responses:
        "200":
          description: OK
          schema:
            type: file
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Stream track audio
      tags:
      - streaming
swagger: "2.0"
